global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "ingestion-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestion-service:8000"]

  - job_name: "ai-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-service:8001"]
