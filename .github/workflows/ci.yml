name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    name: lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.8.4
      - run: ruff check services ml
      - run: ruff format --check services ml

  manifests:
    name: validate k8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: kubectl kustomize infrastructure/kubernetes > /dev/null

  test:
    name: ${{ matrix.service }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ai-service, ingestion-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

  train-smoke:
    name: model training smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r ml/requirements.txt
          pip install -r services/ai-service/requirements.txt

      - name: Train model
        run: python ml/training/train.py
