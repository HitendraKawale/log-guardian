services:
  ingestion-service:
    build:
      context: ../../services/ingestion-service
      dockerfile: Dockerfile
    container_name: lg-ingestion-service
    ports:
      - "8000:8000"
    environment:
      AI_SERVICE_URL: http://ai-service:8001
      AI_TIMEOUT: "2"
      DATABASE_URL: postgresql+asyncpg://logguardian:logguardian@postgres:5432/logguardian
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      ai-service:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  log-consumer:
    build:
      context: ../../services/ingestion-service
      dockerfile: Dockerfile
    container_name: lg-log-consumer
    command: ["python", "-m", "app.consumer"]
    environment:
      AI_SERVICE_URL: http://ai-service:8001
      DATABASE_URL: postgresql+asyncpg://logguardian:logguardian@postgres:5432/logguardian
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      ingestion-service:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.8.0
    container_name: lg-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "9092:9092"
    restart: unless-stopped

  ai-service:
    build:
      context: ../../services/ai-service
      dockerfile: Dockerfile
    container_name: lg-ai-service
    ports:
      - "8001:8001"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: lg-frontend
    ports:
      - "8080:80"
    volumes:
      - ../../frontend:/usr/share/nginx/html:ro
    depends_on:
      - ingestion-service
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: lg-postgres
    environment:
      POSTGRES_USER: logguardian
      POSTGRES_PASSWORD: logguardian
      POSTGRES_DB: logguardian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logguardian"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: lg-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - ingestion-service
      - ai-service
      - alertmanager
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: lg-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ../../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped

  webhook-echo:
    image: mendhak/http-https-echo:31
    container_name: lg-webhook-echo
    environment:
      HTTP_PORT: "8080"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: lg-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
