apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: log-guardian
data:
  AI_SERVICE_URL: "http://ai-service:8001"
  AI_TIMEOUT: "2"
  KAFKA_ENABLED: "true"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: log-guardian
type: Opaque
stringData:
  POSTGRES_USER: logguardian
  POSTGRES_PASSWORD: logguardian
  POSTGRES_DB: logguardian
  DATABASE_URL: postgresql+asyncpg://logguardian:logguardian@postgres:5432/logguardian
